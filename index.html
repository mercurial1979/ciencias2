<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Untitled Document</title>
<style type="text/css">
#uno {
    font-family: "Gill Sans", "Gill Sans MT", "Myriad Pro", "DejaVu Sans Condensed", Helvetica, Arial, sans-serif;
    font-size: 24px;
    font-style: italic;
    color: white;
    background-color: black;
    margin-top: 1%;
	margin-left: 10%;
    padding: 10px;
    height: 30px;
    width: 80%;
	text-align: right;
}
#dos {
    font-family: "Gill Sans", "Gill Sans MT", "Myriad Pro", "DejaVu Sans Condensed", Helvetica, Arial, sans-serif;
	font-style: normal;
	padding: 10px;
    font-size: 18px;
    color: darkslategrey;
    height: 600px;
    width: 80%;
	margin-left: 10%;
    margin-top: 2%;
    list-style-position: inside;
    list-style-type: disc;
	text-align: justify;
}
	li{
		font-style: normal; color: white;
		background-color: dimgrey;
	}
	ol{
		color: dimgrey;
	}
	.dropbtn {
  background-color: #4CAF50;
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

.dropdown-content a:hover {background-color: #f1f1f1}

.dropdown:hover .dropdown-content {
  display: block;
}

.dropdown:hover .dropbtn {
  background-color: #3e8e41;
}
#cuatro {
    font-family: "Gill Sans", "Gill Sans MT", "Myriad Pro", "DejaVu Sans Condensed", Helvetica, Arial, sans-serif;
    font-size: 18px; color:white;
    background-color:darkred;
    padding: 5px;
    height: 45px;
    width: 100%;
}
</style>
</head>

<body>
